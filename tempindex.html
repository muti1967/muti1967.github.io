<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muti's Portfolio</title>
    <style>
      /* LET'S CODE */
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: linear-gradient(45deg, #3498db, #9b59b6);
        background-size: 200% 200%;
        animation: gradientAnimation 10s linear infinite;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      @keyframes gradientAnimation {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .container {
        text-align: center;
        background-color: rgba(255, 255, 255, 0.9);
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        border-radius: 10px;
        padding: 30px;
        max-width: 600px; /* Adjust the max-width as needed */
        position: relative; /* Add position relative to the container */
      }

      img {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        border: 5px solid #333;
      }

      p.username {
        font-size: 24px;
        font-weight: bold;
        margin-top: 10px;
        color: #333;
      }

      ul {
        list-style: none;
        padding: 0;
        margin-top: 20px;
      }

      li {
        font-size: 18px;
        margin: 10px 0;
      }

      a {
        text-decoration: none;
        color: #007bff;
        transition: color 0.3s ease;
      }

      a:hover {
        color: #0056b3;
      }

      p.projects {
        font-weight: bold;
      }

      /* Menu bar styles */
      .menu-bar {
        position: absolute;
        top: 20px; /* Adjust the top position as needed */
        right: 20px; /* Adjust the right position as needed */
        cursor: pointer;
        z-index: 1;
        transition: transform 0.3s ease; /* Add transition effect */
      }

      .menu-icon {
        width: 30px;
        height: 3px;
        background-color: #333;
        margin: 6px 0;
        transition: 0.4s;
      }

      .change .menu-icon {
        background-color: #fff;
      }

      .overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.7);
        z-index: 2;
      }

      .overlay-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: #fff;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
      }

      /* Remove the "x" button */
      .close-button {
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="menu-bar" onclick="toggleMenu()">
        <div class="menu-icon"></div>
        <div class="menu-icon"></div>
        <div class="menu-icon"></div>
      </div>
      <div class="overlay" id="overlay" onclick="toggleMenu()">
        <div class="overlay-content">
          <!-- Remove the "x" button -->
          <ul>
            <li>
              <a href="#">Home</a>
            </li>
            <li>
              <a href="contact.html">Contact</a>
            </li>
          </ul>
        </div>
      </div>
      <img src="images/picofme1.png" alt="Muti's Picture" />
      <p class="username">@mutishuman</p>
      <ul>
        <li>
          <a href="https://www.linkedin.com/in/muti-b574a9158/" target="_blank"
            >My Linkedin</a
          >
        </li>
        <li>
          <a href="https://www.instagram.com/muti97/?hl=en" target="_blank"
            >Instagram</a
          >
        </li>
        <li>
          <a
            href="https://docs.google.com/document/d/1BbMjRx6r9Sf81maGFn1nXdwQ6lzfsqYqYCgwQlMKxcs/edit?usp=sharing"
            target="_blank"
            >My Resume</a
          >
        </li>
        <p class="projects">My Projects:</p>
        <li>
          <a href="https://emotion.ai-camp.org/" target="_blank"
            >AI Emotion Detector</a
          >
        </li>
        <li>
          <a
            href="https://docs.google.com/presentation/d/1EVZXclfxV-U5qsrRCuz_W_7lQFvbYk2d9s56zI6LqOI/edit#slide=id.gdc05ca4402_0_0"
            target="_blank"
            >Auto Desk Design Challenge</a
          >
        </li>

        <p>A little rough right now, more progress is soon to come ...</p>
      </ul>
    </div>
    <script>
      function toggleMenu() {
        var overlay = document.getElementById("overlay");
        var menuBar = document.querySelector(".menu-bar");

        if (overlay.style.display === "block") {
          overlay.style.display = "none";
          menuBar.classList.remove("change");
        } else {
          overlay.style.display = "block";
          menuBar.classList.add("change");
        }
      }
    </script>
  </body>
</html>
