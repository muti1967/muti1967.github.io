<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muti's Web Links</title>
    <style>
      /*LETS CODE*/
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-image: linear-gradient(45deg, #3498db, #9b59b6);
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        text-align: center;
        background-color: rgba(255, 255, 255, 0.9);
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        border-radius: 10px;
        padding: 30px;
        max-width: 600px; /* Adjust the max-width as needed */
      }

      img {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        border: 5px solid #333;
      }

      p.username {
        font-size: 24px;
        font-weight: bold;
        margin-top: 10px;
        color: #333;
      }

      ul {
        list-style: none;
        padding: 0;
        margin-top: 20px;
      }

      li {
        font-size: 18px;
        margin: 10px 0;
      }

      a {
        text-decoration: none;
        color: #007bff;
        transition: color 0.3s ease;
      }

      a:hover {
        color: #0056b3;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <img src="images/picofme.jpeg" alt="Muti's Picture" />
      <p class="username">@muti1967</p>
      <ul>
        <li>
          <a href="https://www.linkedin.com/in/muti-b574a9158/" target="_blank"
            >My Linkedin</a
          >
        </li>
        <li>
          <a href="https://www.instagram.com/muti97/?hl=en" target="_blank"
            >Instagram</a
          >
        </li>
        <li>
          <a
            href="https://docs.google.com/document/d/1BbMjRx6r9Sf81maGFn1nXdwQ6lzfsqYqYCgwQlMKxcs/edit?usp=sharing"
            target="_blank"
            >My Resume</a
          >
        </li>
        <p>A little rough right now, more progress is soon to come ...</p>
      </ul>
    </div>
  </body>
</html>
