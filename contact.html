<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact me!</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      .interactive-background {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #3498db, #9b59b6, #e74c3c, #f1c40f);
        background-size: 400% 400%;
        animation: gradientAnimation 10s infinite;
      }

      .container {
        text-align: center;
        background-color: rgba(255, 255, 255, 0.9);
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        border-radius: 10px;
        padding: 30px;
        max-width: 600px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 1;
        animation: fadeIn 1s ease-in-out;
      }

      @keyframes fadeIn {
        0% {
          opacity: 0;
        }
        100% {
          opacity: 1;
        }
      }

      h1 {
        font-size: 32px;
        font-weight: bold;
        color: #333;
        margin-bottom: 20px;
      }

      p {
        font-size: 18px;
        color: #333;
        margin: 10px 0;
      }

      .contact-info {
        margin-top: 20px;
        text-align: center;
      }

      /* Remove the dots from the specific list items */
      .social-links ul {
        list-style-type: none;
        padding: 0;
      }

      .social-links ul li {
        margin: 10px 0;
      }

      a {
        text-decoration: none;
        color: #007bff;
        transition: color 0.3s ease;
      }

      a:hover {
        color: #0056b3;
      }

      /* Interactive background animation */
      @keyframes gradientAnimation {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
    </style>
  </head>

  <body>
    <div class="interactive-background"></div>
    <div class="container">
      <h1>Need to reach out?</h1>
      <p>
        Please feel free to connect with me! You can reach out to me through the
        following contact information:
      </p>

      <div class="contact-info">
        <p>
          <strong>Email:</strong>
          <a href="mailto:mutishuman@gmail.com">Mail me here</a>
        </p>
        <p><strong></strong></p>
      </div>

      <div class="social-links">
        <p>My Socials:</p>
        <ul>
          <li>
            <a
              href="https://www.linkedin.com/in/muti-b574a9158/"
              target="_blank"
              >LinkedIn</a
            >
          </li>
          <li>
            <a href="https://www.instagram.com/muti97/?hl=en" target="_blank"
              >Instagram</a
            >
          </li>
          <!-- Add more social media links here -->
        </ul>
      </div>
    </div>
  </body>
</html>
